<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="background-animation"></div>
    <div class="login-container">
        <div class="login-header">
            <img src="images/login_logo.png" onerror="this.src='images/logo.png'" alt="Logo" class="login-logo"
                style="max-height: 80px; margin-bottom: 1rem; display: block; margin-left: auto; margin-right: auto;">
            <h1>Bienvenido</h1>
            <p>Ingresa a tu cuenta para continuar</p>
        </div>
        <form id="login-form">
            <div class="input-group">
                <label for="tenant">Código de Empresa</label>
                <div class="input-wrapper">
                    <i class="fas fa-building"></i>
                    <input type="text" id="tenant" placeholder="ej: mipos" required>
                </div>
            </div>
            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="ejemplo@correo.com" required>
                </div>
            </div>
            <div class="input-group">
                <label for="password">Contraseña</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <div class="forgot-wrapper">
                    <a href="#" class="forgot-password" onclick="openRecoverModal(); return false;">¿Olvidaste tu contraseña?</a>
                </div>
            </div>
            <div class="button-group">
                <button type="button" class="btn-cancel"
                    onclick="document.getElementById('login-form').reset()">Limpiar</button>
                <button type="submit" class="btn-login">Acceder</button>
            </div>
        </form>
    </div>

    <!-- Recovery Modal -->
    <div id="recoverModal" class="modal">
        <div class="modal-content login-container" style="margin: 0; text-align: center;">
            <div class="modal-header" style="justify-content: center; margin-bottom: 1rem;">
                <h2 style="color: var(--primary-color);">Recuperar Acceso</h2>
            </div>
            <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Ingresa el código de tu empresa y tu correo para notificar a un
                administrador.</p>
            <form id="recoverForm">
                <div class="input-group">
                                        <label for="recoverTenant">Código de Empresa</label>
                    <div class="input-wrapper">
                        <i class="fas fa-building"></i>
                        <input type="text" id="recoverTenant" placeholder="ej: mipos" required>
                    </div>
                </div>
                <div class="input-group">
                    <label for="recoverEmail">Correo Electrónico</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="recoverEmail" placeholder="tu@correo.com" required>
                    </div>
                </div>
                <div class="button-group" style="justify-content: center; margin-top: 1rem;">
                    <button type="button" class="btn-cancel"
                        onclick="document.getElementById('recoverModal').style.display='none'">Cancelar</button>
                    <button type="submit" class="btn-login">Enviar Solicitud</button>
                </div>
            </form>
        </div>
    </div>
    <!-- Notification Modal -->
    <div id="notificationModal" class="modal">
        <div class="modal-content login-container" style="margin: 0; text-align: center;">
            <div class="modal-header" style="justify-content: center; margin-bottom: 1rem;">
                <h2 id="notificationTitle" style="color: var(--primary-color);">Aviso</h2>
            </div>
            <p id="notificationMessage" style="margin-bottom: 2rem; color: var(--text-color);"></p>
            <button class="btn-login" onclick="closeNotification()">Entendido</button>
        </div>
    </div>

    <!-- Notification Modal -->
    <!-- Confirmation Modal -->
    <div id="confirmModal" class="modal">
        <div class="modal-content login-container" style="margin: 0; text-align: center;">
            <div class="modal-header" style="justify-content: center; margin-bottom: 1rem;">
                <h2 id="confirmTitle" style="color: var(--primary-color);">Confirmación</h2>
            </div>
            <p id="confirmMessage" style="margin-bottom: 2rem; color: var(--text-color);"></p>
            <div class="button-group" style="justify-content: center; gap: 10px;">
                <button class="btn-cancel" onclick="closeConfirm(false)">Cancelar</button>
                <button class="btn-login" onclick="closeConfirm(true)">Aceptar</button>
            </div>
        </div>
    </div>

        <script src="js/nucleo.js"></script>
</body>

</html>
