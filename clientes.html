<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - PiduNet</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="background-animation"></div>

    <div class="app-layout">
        <nav class="sidebar">
            <div class="sidebar-brand">
                <img src="images/logo.png" alt="Logo" class="sidebar-logo">
            </div>

            <div class="sidebar-nav">
                <div class="sidebar-label">Principal</div>
                <a href="/" class="nav-item">
                    <i class="fas fa-home"></i> Inicio
                </a>
                <a href="pdv.html" class="nav-item">
                    <i class="fas fa-cash-register"></i> Punto de Venta
                </a>
                <a href="reportes.html" class="nav-item">
                    <i class="fas fa-chart-line"></i> Reportes
                </a>

                <div class="sidebar-label">Gestión</div>
                <a href="inventario.html" class="nav-item">
                    <i class="fas fa-box"></i> Inventario
                </a>
                <a href="categorias.html" class="nav-item">
                    <i class="fas fa-tags"></i> Categorías
                </a>
                <a href="proveedores.html" class="nav-item">
                    <i class="fas fa-truck"></i> Proveedores
                </a>
                <a href="clientes.html" class="nav-item active">
                    <i class="fas fa-user-friends"></i> Clientes
                </a>
                <a href="cuentas.html" class="nav-item">
                    <i class="fas fa-file-invoice-dollar"></i> Cuentas por Pagar
                </a>

                <div class="sidebar-label">Admin</div>
                <a href="usuarios.html" class="nav-item">
                    <i class="fas fa-users"></i> Usuarios
                </a>
                <a href="configuracion.html" class="nav-item">
                    <i class="fas fa-cog"></i> Configuración
                </a>
            </div>

            <div class="sidebar-footer">
                <div class="user-mini-profile" onclick="logout()">
                    <div class="user-mini-avatar"><i class="fas fa-sign-out-alt"></i></div>
                    <div class="user-mini-info">
                        <span class="name">Cerrar Sesión</span>
                    </div>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <div class="main-container" style="max-width: 100%;">
                <header class="page-header">
                    <div class="header-left">
                        <h1>Clientes</h1>
                    </div>
                    <div class="header-actions">
                        <button id="btnNewClient" class="btn-login"><i class="fas fa-plus"></i> Nuevo
                            Cliente</button>
                    </div>

                    <div class="user-profile-header" id="userProfileHeader" style="display: none; margin-left: 1rem;">
                        <div class="profile-info">
                            <span class="profile-name" id="profileName">Cargando...</span>
                            <span class="profile-role" id="profileRole">...</span>
                        </div>
                        <div class="profile-avatar-container" id="profileAvatarContainer">
                            <div class="user-avatar-placeholder small"><i class="fas fa-user"></i></div>
                        </div>
                    </div>
                </header>

                <div class="table-container">
                    <table id="clientsTable">
                        <thead>
                            <tr>
                                <th>Cédula / ID</th>
                                <th>Nombre</th>
                                <th>Email</th>
                                <th>Teléfono</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="clientsBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="clientModal" class="modal">
        <div class="modal-content login-container" style="margin: 0; max-width: 450px;">
            <div class="modal-header">
                <h2 id="modalTitle">Nuevo Cliente</h2>
                <span class="close">&times;</span>
            </div>
            <form id="clientForm">
                <input type="hidden" id="clientId">
                <div class="input-group">
                    <label for="cliCedula">Cédula / ID (Único)</label>
                    <div class="input-wrapper">
                        <i class="fas fa-id-card"></i>
                        <input type="text" id="cliCedula" required placeholder="V-12345678">
                    </div>
                </div>
                <div class="input-group">
                    <label for="cliNombre">Nombre Completo</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="cliNombre" required>
                    </div>
                </div>
                <div class="input-group">
                    <label for="cliEmail">Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="cliEmail">
                    </div>
                </div>
                <div class="input-group">
                    <label for="cliTelefono">Teléfono</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone"></i>
                        <input type="text" id="cliTelefono">
                    </div>
                </div>

                <div class="button-group mt-1-5">
                    <button type="button" class="btn-cancel" id="btnCancel">Cancelar</button>
                    <button type="submit" class="btn-login">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <div id="notificationModal" class="modal">
        <div class="modal-content login-container text-center m-0">
            <div class="modal-header justify-center">
                <h2 id="notificationTitle">Aviso</h2>
            </div>
            <p id="notificationMessage" class="mb-1-5 text-color"></p>
            <div class="button-group justify-center">
                <button class="btn-login" id="btnCloseNotification">Entendido</button>
            </div>
        </div>
    </div>

    <script src="js/nucleo.js"></script>
    <script src="js/sistema.js"></script>
</body>

</html>
